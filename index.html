<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0061F5" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#0F1115" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="M-Scanner">
    <meta name="description" content="Escáner de códigos de barras e inventario con búsqueda automática de productos.">
    <title>M-Scanner 2.0</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="image/icon-192.png">
    <link rel="icon" type="image/png" href="image/icon-192.png">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="app-container" class="container">

        <!-- ============ TOP BAR ============ -->
        <header class="topbar">
            <div class="topbar__brand">
                <div class="topbar__logo" aria-hidden="true">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 7V5a2 2 0 0 1 2-2h2M3 17v2a2 2 0 0 0 2 2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2"/>
                        <path d="M7 8v8M11 8v8M15 8v8"/>
                    </svg>
                </div>
                M-Scanner
            </div>
            <div class="topbar__spacer"></div>
            <button class="topbar__action" id="theme-toggle" aria-label="Cambiar tema" title="Cambiar tema">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="4"/>
                    <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
                </svg>
            </button>
        </header>

        <!-- ============ MAIN ============ -->
        <main class="main">

            <!-- ===== VIEW: ESCANEAR / FORM ===== -->
            <section class="view is-active" id="view-escanear" role="tabpanel" aria-label="Escanear y editar producto">
                <div class="hero-card">
                    <div class="hero-card__icon" aria-hidden="true">
                        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 7V5a2 2 0 0 1 2-2h2M3 17v2a2 2 0 0 0 2 2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2"/>
                            <path d="M7 8v8M11 8v8M15 8v8"/>
                        </svg>
                    </div>
                    <div>
                        <div class="hero-card__title">Escaneá o buscá el producto</div>
                        <div class="hero-card__subtitle">Obtené nombre, precio e imagen al instante</div>
                    </div>
                </div>

                <div class="searchbar">
                    <input type="text" id="barcode" placeholder="Código de barras o nombre" inputmode="numeric" autocomplete="off">
                    <button class="searchbar__btn" id="search-button" aria-label="Buscar producto" title="Buscar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="7"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                    </button>
                </div>

                <div class="product-image-wrap" id="product-image-container">
                    <img id="product-image" src="" alt="Imagen del producto">
                </div>

                <div class="card">
                    <div class="card__header">
                        <div class="card__title">Datos del producto</div>
                    </div>
                    <div class="field">
                        <input type="text" id="description" placeholder=" " autocomplete="off" required>
                        <label for="description">Descripción</label>
                    </div>
                    <div class="grid-2">
                        <div class="field">
                            <input type="number" id="stock" placeholder=" " inputmode="numeric" min="0">
                            <label for="stock">Stock</label>
                        </div>
                        <div class="field">
                            <input type="number" id="price" placeholder=" " inputmode="decimal" min="0" step="0.01">
                            <label for="price">Precio</label>
                        </div>
                    </div>
                </div>

                <div class="grid-2">
                    <button class="btn btn--success btn--lg" id="save-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>
                        Guardar
                    </button>
                    <button class="btn btn--outline btn--lg" id="clear-button">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                        Limpiar
                    </button>
                </div>
            </section>

            <!-- ===== VIEW: PRODUCTOS ===== -->
            <section class="view" id="view-productos" role="tabpanel" aria-label="Lista de productos">
                <div class="searchbar">
                    <input type="text" id="inventory-search" placeholder="Buscar en inventario..." autocomplete="off">
                    <button class="searchbar__btn" id="inventory-refresh" aria-label="Recargar" title="Recargar">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-3-6.7L21 8"/><path d="M21 3v5h-5"/></svg>
                    </button>
                </div>

                <div class="chips">
                    <button class="chip is-active" data-filter="all">Todos</button>
                    <button class="chip" data-filter="stock">Con stock</button>
                    <button class="chip" data-filter="low">Stock bajo</button>
                    <button class="chip" data-filter="zero">Sin stock</button>
                </div>

                <div id="inventory-list" aria-live="polite">
                    <div class="empty-state">
                        <div class="empty-state__icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
                        </div>
                        <div class="empty-state__title">Sin productos aún</div>
                        <div class="empty-state__text">Escaneá o importá un Excel para empezar</div>
                    </div>
                </div>

                <div class="grid-2">
                    <button class="btn btn--tonal" id="import-button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg>
                        Importar
                    </button>
                    <button class="btn btn--tonal" id="export-button">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                        Exportar
                    </button>
                </div>
                <input type="file" id="fileInput" accept=".xlsx, .xls" style="display:none;" />
            </section>

            <!-- ===== VIEW: STOCK BAJO ===== -->
            <section class="view" id="view-stock-bajo" role="tabpanel" aria-label="Productos con stock bajo">
                <div id="low-stock-results" aria-live="polite">
                    <div class="empty-state">
                        <div class="empty-state__icon">
                            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><path d="M12 9v4M12 17h.01"/></svg>
                        </div>
                        <div class="empty-state__title">Cargando alertas...</div>
                        <div class="empty-state__text">Buscamos productos con stock ≤ 5</div>
                    </div>
                </div>
                <button class="btn btn--outline btn--block" id="low-stock-button">
                    Actualizar lista
                </button>
                <ul class="low-stock-list" id="low-stock-list"></ul>
            </section>

        </main>

        <!-- ============ BOTTOM NAV ============ -->
        <nav class="bottomnav" role="navigation" aria-label="Navegación principal">
            <button class="nav-item is-active" data-view="escanear" aria-label="Escanear">
                <span class="nav-item__icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7V5a2 2 0 0 1 2-2h2M3 17v2a2 2 0 0 0 2 2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 8v8M11 8v8M15 8v8"/></svg>
                </span>
                Escanear
            </button>
            <button class="fab" id="scan-button-fab" aria-label="Escanear código de barras" title="Escanear">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="5" height="5" rx="1"/><rect x="16" y="3" width="5" height="5" rx="1"/><rect x="3" y="16" width="5" height="5" rx="1"/><path d="M16 16h5v5M21 16v-5h-5M3 11h5v-5"/></svg>
            </button>
            <button class="nav-item" data-view="productos" aria-label="Productos">
                <span class="nav-item__icon">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><path d="M3.27 6.96 12 12.01l8.73-5.05M12 22.08V12"/></svg>
                </span>
                Productos
            </button>
        </nav>

        <!-- ============ SCANNER OVERLAY ============ -->
        <div class="scanner-overlay" id="scanner-container">
            <button class="scanner-close" id="scanner-close" aria-label="Cerrar escáner">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
            <video id="video" autoplay playsinline></video>
            <div id="viewfinder"></div>
            <div class="scanner-hint">Centrá el código de barras en el recuadro</div>
        </div>

        <!-- ============ TOAST ============ -->
        <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script type="module" src="script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js').catch(console.error);
            });
        }
    </script>
</body>
</html>
